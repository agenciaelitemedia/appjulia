<title>Call Center — Recuperação de Oportunidades (Protótipo)</title>
<style>
  :root{
    --ground:#eef2f6; --surface:#ffffff; --surface-2:#f8fafc; --surface-3:#f1f5f9;
    --text:#0f172a; --text-soft:#64748b; --text-faint:#94a3b8;
    --line:#e2e8f0; --line-strong:#cbd5e1;
    --brand-a:#2563eb; --brand-b:#4338ca;
    --sidebar:#0f172a; --sidebar-2:#1e293b; --sidebar-tx:#cbd5e1; --sidebar-faint:#64748b;
    --call:#16a34a; --call-dark:#15803d;
    --shadow:0 1px 2px rgba(15,23,42,.06),0 4px 12px rgba(15,23,42,.05);
    --shadow-lg:0 10px 30px rgba(15,23,42,.14);
    --silent:#ef4444;--silent-bg:#fef2f2;--silent-bd:#fecaca;
    --objection:#f59e0b;--objection-bg:#fffbeb;--objection-bd:#fde68a;
    --qualified:#8b5cf6;--qualified-bg:#f5f3ff;--qualified-bd:#ddd6fe;
    --unsigned:#3b82f6;--unsigned-bg:#eff6ff;--unsigned-bd:#bfdbfe;
    --signed:#10b981;--signed-bg:#ecfdf5;--signed-bd:#a7f3d0;
    --good:#059669;--warn:#d97706;--bad:#dc2626;
    --wa-bg-a:#e6ddd2;--wa-bg-b:#d9cfc2;--wa-lead:#ffffff;--wa-lead-tx:#0f172a;--wa-out:#dcf8c6;--wa-out-tx:#0f3312;--wa-att:#e9d5ff;--wa-att-tx:#3b0764;
  }
  @media (prefers-color-scheme:dark){
    :root{
      --ground:#020617;--surface:#0b1220;--surface-2:#0f172a;--surface-3:#131f34;
      --text:#e8edf5;--text-soft:#94a3b8;--text-faint:#64748b;--line:#1e293b;--line-strong:#334155;
      --sidebar:#060b16;--sidebar-2:#0f1a2e;--sidebar-tx:#94a3b8;--sidebar-faint:#475569;
      --shadow:0 1px 2px rgba(0,0,0,.4),0 4px 14px rgba(0,0,0,.35);--shadow-lg:0 12px 34px rgba(0,0,0,.55);
      --silent-bg:#2a1416;--silent-bd:#7f1d1d;--objection-bg:#2a2010;--objection-bd:#78550f;
      --qualified-bg:#1e1633;--qualified-bd:#5b21b6;--unsigned-bg:#111f38;--unsigned-bd:#1e40af;--signed-bg:#0d2620;--signed-bd:#065f46;
      --wa-bg-a:#0c1a17;--wa-bg-b:#0a1512;--wa-lead:#1f2c34;--wa-lead-tx:#e8edf5;--wa-out:#065f46;--wa-out-tx:#d1fae5;--wa-att:#3b0764;--wa-att-tx:#e9d5ff;
    }
  }
  :root[data-theme="light"]{--ground:#eef2f6;--surface:#fff;--surface-2:#f8fafc;--surface-3:#f1f5f9;--text:#0f172a;--text-soft:#64748b;--text-faint:#94a3b8;--line:#e2e8f0;--line-strong:#cbd5e1;--sidebar:#0f172a;--sidebar-2:#1e293b;--sidebar-tx:#cbd5e1;--sidebar-faint:#64748b;--shadow:0 1px 2px rgba(15,23,42,.06),0 4px 12px rgba(15,23,42,.05);--shadow-lg:0 10px 30px rgba(15,23,42,.14);--silent-bg:#fef2f2;--silent-bd:#fecaca;--objection-bg:#fffbeb;--objection-bd:#fde68a;--qualified-bg:#f5f3ff;--qualified-bd:#ddd6fe;--unsigned-bg:#eff6ff;--unsigned-bd:#bfdbfe;--signed-bg:#ecfdf5;--signed-bd:#a7f3d0;--wa-bg-a:#e6ddd2;--wa-bg-b:#d9cfc2;--wa-lead:#fff;--wa-lead-tx:#0f172a;--wa-out:#dcf8c6;--wa-out-tx:#0f3312;--wa-att:#e9d5ff;--wa-att-tx:#3b0764;}
  :root[data-theme="dark"]{--ground:#020617;--surface:#0b1220;--surface-2:#0f172a;--surface-3:#131f34;--text:#e8edf5;--text-soft:#94a3b8;--text-faint:#64748b;--line:#1e293b;--line-strong:#334155;--sidebar:#060b16;--sidebar-2:#0f1a2e;--sidebar-tx:#94a3b8;--sidebar-faint:#475569;--shadow:0 1px 2px rgba(0,0,0,.4),0 4px 14px rgba(0,0,0,.35);--shadow-lg:0 12px 34px rgba(0,0,0,.55);--silent-bg:#2a1416;--silent-bd:#7f1d1d;--objection-bg:#2a2010;--objection-bd:#78550f;--qualified-bg:#1e1633;--qualified-bd:#5b21b6;--unsigned-bg:#111f38;--unsigned-bd:#1e40af;--signed-bg:#0d2620;--signed-bd:#065f46;--wa-bg-a:#0c1a17;--wa-bg-b:#0a1512;--wa-lead:#1f2c34;--wa-lead-tx:#e8edf5;--wa-out:#065f46;--wa-out-tx:#d1fae5;--wa-att:#3b0764;--wa-att-tx:#e9d5ff;}

  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{background:var(--ground);color:var(--text);font-family:"Segoe UI",system-ui,-apple-system,Roboto,Helvetica,Arial,sans-serif;font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased}
  .tnum{font-variant-numeric:tabular-nums}
  button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
  button:focus-visible,[tabindex]:focus-visible,textarea:focus-visible{outline:2px solid var(--brand-a);outline-offset:1px;border-radius:8px}

  /* ---------- APP SHELL (layout da Julia) ---------- */
  .shell{display:flex;height:100vh;overflow:hidden}
  .sidebar{width:216px;flex-shrink:0;background:var(--sidebar);color:var(--sidebar-tx);display:flex;flex-direction:column;padding:14px 12px;gap:3px}
  .sb-brand{display:flex;align-items:center;gap:10px;padding:6px 8px 14px}
  .sb-brand .mk{width:34px;height:34px;border-radius:10px;background:linear-gradient(135deg,var(--brand-a),var(--brand-b));display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;font-size:17px}
  .sb-brand b{color:#fff;font-size:15px;letter-spacing:-.01em}
  .sb-brand span{display:block;font-size:10px;color:var(--sidebar-faint)}
  .sb-sec{font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:var(--sidebar-faint);padding:12px 10px 4px;font-weight:700}
  .nav{display:flex;align-items:center;gap:11px;padding:9px 11px;border-radius:10px;font-size:13.5px;font-weight:600;color:var(--sidebar-tx)}
  .nav .ic{width:18px;text-align:center;opacity:.85}
  .nav:hover{background:var(--sidebar-2);color:#fff}
  .nav.active{background:linear-gradient(135deg,var(--brand-a),var(--brand-b));color:#fff}
  .nav .pill{margin-left:auto;background:var(--silent);color:#fff;font-size:10px;font-weight:800;padding:1px 7px;border-radius:999px}
  .sb-foot{margin-top:auto;display:flex;align-items:center;gap:9px;padding:9px 10px;border-top:1px solid var(--sidebar-2)}
  .sb-foot .av{width:28px;height:28px;border-radius:50%;background:var(--sidebar-2);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;color:#fff}
  .sb-foot .nm{font-size:12px;color:#fff;font-weight:600} .sb-foot .rl{font-size:10px;color:var(--sidebar-faint)}

  .main{flex:1;min-width:0;display:flex;flex-direction:column;background:var(--ground)}
  .apphead{height:56px;flex-shrink:0;background:var(--surface);border-bottom:1px solid var(--line);display:flex;align-items:center;gap:12px;padding:0 20px}
  .apphead .crumb{font-size:12px;color:var(--text-faint)} .apphead h1{font-size:16px;font-weight:800;margin:0;letter-spacing:-.01em}
  .apphead .sp{flex:1}
  .urgent-pill{display:inline-flex;align-items:center;gap:6px;background:color-mix(in srgb,var(--silent) 14%,transparent);color:var(--silent);padding:6px 11px;border-radius:999px;font-size:12px;font-weight:800}
  .urgent-pill .dot{width:7px;height:7px;border-radius:50%;background:var(--silent);animation:pulse 1.6s infinite}
  .icon-btn{width:34px;height:34px;border-radius:9px;display:flex;align-items:center;justify-content:center;color:var(--text-soft);border:1px solid var(--line);background:var(--surface-2)}
  .icon-btn:hover{color:var(--text);border-color:var(--line-strong)}
  .content{flex:1;min-height:0;overflow:hidden;position:relative}

  /* ---------- TRIAGE ---------- */
  .triage-scroll{height:100%;overflow-y:auto;padding:18px 22px 40px}
  .triage-inner{max-width:1120px;margin:0 auto}
  .kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:16px}
  .kpi{background:var(--surface);border:1px solid var(--line);border-radius:14px;padding:14px 16px;box-shadow:var(--shadow)}
  .kpi .v{font-size:27px;font-weight:800;letter-spacing:-.02em;line-height:1}
  .kpi .l{font-size:11px;color:var(--text-faint);text-transform:uppercase;letter-spacing:.05em;margin-top:6px;font-weight:700}
  .kpi.crit .v{color:var(--bad)} .kpi.good .v{color:var(--good)}
  .toolbar{display:flex;align-items:center;gap:10px;margin-bottom:14px;flex-wrap:wrap}
  .filters{display:flex;gap:8px;flex-wrap:wrap;flex:1}
  .chip{white-space:nowrap;padding:8px 13px;border-radius:10px;font-size:13px;font-weight:700;background:var(--surface);border:1px solid var(--line);color:var(--text-soft);display:inline-flex;align-items:center;gap:7px}
  .chip:hover{color:var(--text);border-color:var(--line-strong)}
  .chip[aria-pressed="true"]{background:var(--text);color:var(--surface);border-color:var(--text)}
  .chip .cdot{width:8px;height:8px;border-radius:50%} .chip .cnt{font-size:11px;opacity:.72;font-weight:800}
  .pull{padding:10px 16px;border-radius:11px;background:linear-gradient(135deg,var(--brand-a),var(--brand-b));color:#fff;font-weight:800;font-size:13px;display:inline-flex;align-items:center;gap:8px;box-shadow:var(--shadow-lg);white-space:nowrap}
  .pull:hover{filter:brightness(1.06)} .pull:disabled{opacity:.5;filter:none;cursor:default}
  .list{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:12px}

  .card{position:relative;text-align:left;width:100%;background:var(--surface);border:1.5px solid var(--line);border-radius:15px;padding:14px 15px 13px 18px;box-shadow:var(--shadow);transition:transform .08s,box-shadow .15s;overflow:hidden}
  .card:hover{box-shadow:var(--shadow-lg);transform:translateY(-1px)}
  .card .stripe{position:absolute;left:0;top:0;bottom:0;width:5px}
  .card.t-silent{border-color:var(--silent-bd)} .card.t-silent .stripe{background:var(--silent)}
  .card.t-objection{border-color:var(--objection-bd)} .card.t-objection .stripe{background:var(--objection)}
  .card.t-qualified{border-color:var(--qualified-bd)} .card.t-qualified .stripe{background:var(--qualified)}
  .card.t-unsigned{border-color:var(--unsigned-bd)} .card.t-unsigned .stripe{background:var(--unsigned)}
  .card.t-signed{border-color:var(--signed-bd)} .card.t-signed .stripe{background:var(--signed)}
  .card-top{display:flex;justify-content:space-between;gap:10px;align-items:flex-start}
  .who{display:flex;align-items:center;gap:8px;margin-bottom:7px;flex-wrap:wrap}
  .who .emoji{font-size:16px} .who .name{font-weight:800;letter-spacing:-.01em}
  .tagrow{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:7px}
  .badge{display:inline-flex;align-items:center;gap:5px;padding:3px 9px;border-radius:999px;font-size:10px;font-weight:800;letter-spacing:.02em}
  .badge .bdot{width:6px;height:6px;border-radius:50%} .badge.pulse{animation:pulse 1.6s infinite}
  .badge-trigger{color:#fff}
  .t-silent .badge-trigger{background:var(--silent)} .t-objection .badge-trigger{background:var(--objection)}
  .t-qualified .badge-trigger{background:var(--qualified)} .t-unsigned .badge-trigger{background:var(--unsigned)} .t-signed .badge-trigger{background:var(--signed)}
  .badge-urgent{background:var(--bad);color:#fff;padding:2px 7px;font-size:9.5px}
  .contract{display:inline-flex;align-items:center;gap:5px;padding:3px 9px;border-radius:999px;font-size:9.5px;font-weight:800}
  .contract .bdot{width:6px;height:6px;border-radius:50%}
  .c-emitir{background:var(--objection-bg);color:var(--warn)} .c-emitir .bdot{background:var(--objection)}
  .c-emitido{background:var(--unsigned-bg);color:var(--unsigned)} .c-emitido .bdot{background:var(--unsigned)}
  .c-assinado{background:var(--signed-bg);color:var(--good)} .c-assinado .bdot{background:var(--signed)}
  .sub{font-size:12px;color:var(--text-faint)}
  .nextact{margin-top:10px;display:flex;align-items:center;gap:7px;font-size:12px;color:var(--text-soft);background:var(--surface-3);border:1px solid var(--line);border-radius:9px;padding:7px 10px;font-weight:600}
  .nextact b{color:var(--text)}
  .card-right{display:flex;flex-direction:column;align-items:flex-end;gap:8px;flex-shrink:0}
  .sla{text-align:right} .sla .t{font-size:16px;font-weight:800;letter-spacing:-.01em}
  .sla .t.over{color:var(--bad)} .sla .t.ok{color:var(--good)} .sla .t.warn{color:var(--warn)}
  .sla .l{font-size:9px;color:var(--text-faint);text-transform:uppercase;letter-spacing:.04em;font-weight:700}
  .prio{display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:800;color:var(--text-soft)}
  .empty{grid-column:1/-1;text-align:center;padding:70px 20px;color:var(--text-faint)}

  /* ---------- WORKSPACE (2 painéis, chat sempre visível) ---------- */
  #workspace{position:absolute;inset:0;display:flex;flex-direction:column;background:var(--ground)}
  .ws-bar{flex-shrink:0;background:var(--surface);border-bottom:1px solid var(--line);padding:11px 20px;display:flex;align-items:center;gap:14px}
  .ws-bar.t-silent{box-shadow:inset 4px 0 0 var(--silent)} .ws-bar.t-objection{box-shadow:inset 4px 0 0 var(--objection)}
  .ws-bar.t-qualified{box-shadow:inset 4px 0 0 var(--qualified)} .ws-bar.t-unsigned{box-shadow:inset 4px 0 0 var(--unsigned)} .ws-bar.t-signed{box-shadow:inset 4px 0 0 var(--signed)}
  .back{display:inline-flex;align-items:center;gap:6px;font-size:13px;color:var(--text-soft);font-weight:600;flex-shrink:0}
  .back:hover{color:var(--text)}
  .ws-id{min-width:0;flex:1;display:flex;align-items:center;gap:12px}
  .ws-id .nm{font-size:15px;font-weight:800;letter-spacing:-.01em;white-space:nowrap}
  .ws-id .tags{display:flex;gap:6px;flex-wrap:wrap}
  .ws-bar .sla{margin-left:auto}
  .ws-grid{flex:1;min-height:0;display:grid;grid-template-columns:minmax(360px,44%) 1fr}
  .ws-left{overflow-y:auto;padding:16px 18px 40px;border-right:1px solid var(--line)}
  .ws-chat{display:flex;flex-direction:column;min-height:0;background:var(--surface)}

  .motivo{font-size:12.5px;color:var(--text-soft);background:var(--surface);border:1px solid var(--line);border-radius:11px;padding:10px 12px;display:flex;gap:8px;box-shadow:var(--shadow)}
  .motivo b{color:var(--text)}
  .panel{background:var(--surface);border:1px solid var(--line);border-radius:12px;margin-top:11px;overflow:hidden;box-shadow:var(--shadow)}
  .panel-h{width:100%;display:flex;align-items:center;justify-content:space-between;padding:11px 13px;font-size:13px;font-weight:700}
  .panel-h .lft{display:flex;align-items:center;gap:9px}
  .panel-b{border-top:1px solid var(--line);padding:10px 13px 12px}
  .muted{color:var(--text-faint);font-size:12.5px;padding:6px 0}
  .kv{display:flex;gap:8px;padding:5px 0;border-bottom:1px solid var(--line);font-size:12.5px}
  .kv:last-child{border-bottom:none}
  .kv .k{min-width:92px;color:var(--text-faint);font-size:10px;text-transform:uppercase;letter-spacing:.03em;font-weight:700;flex-shrink:0}
  .logrow{display:flex;gap:10px;font-size:12px;background:var(--surface-2);border-radius:9px;padding:8px 10px;margin-top:6px}
  .logrow .meta{color:var(--text-faint)} .logrow .res{color:var(--text);font-weight:600;margin-top:2px}
  .filerow{display:flex;align-items:center;gap:10px;background:var(--surface-2);border-radius:9px;padding:8px 10px;margin-top:6px}
  .filerow .fi{width:28px;height:28px;border-radius:7px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
  .fi.img{background:var(--unsigned-bg);color:var(--unsigned)} .fi.pdf{background:var(--silent-bg);color:var(--silent)}
  .filerow .fn{font-size:12px;font-weight:600} .filerow .fs{font-size:10px;color:var(--text-faint)}

  /* stepper */
  .flow{margin-top:16px}
  .flow-h{display:flex;align-items:center;justify-content:space-between;padding:0 2px 2px}
  .flow-h .ttl{font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.06em;color:var(--text-soft)}
  .flow-h .prog{font-size:12px;color:var(--text-faint);font-weight:700}
  .step{background:var(--surface);border:1.5px solid var(--line);border-radius:13px;margin-top:9px;overflow:hidden;box-shadow:var(--shadow)}
  .step.active{border-color:var(--brand-a);box-shadow:0 0 0 3px color-mix(in srgb,var(--brand-a) 18%,transparent),var(--shadow)}
  .step.locked{opacity:.5} .step.done{opacity:.95}
  .step-h{display:flex;align-items:center;gap:11px;padding:11px 12px}
  .step-n{width:28px;height:28px;border-radius:8px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:13px;background:var(--surface-3);color:var(--text-soft)}
  .step.active .step-n{background:linear-gradient(135deg,var(--brand-a),var(--brand-b));color:#fff}
  .step.done .step-n{background:var(--signed-bg);color:var(--good)}
  .step-info{flex:1;min-width:0} .step-info .sl{font-weight:700;font-size:13.5px} .step-info .sc{font-size:11px;color:var(--text-faint);margin-top:1px}
  .step-res{font-size:10.5px;font-weight:800;padding:3px 8px;border-radius:999px;white-space:nowrap}
  .res-ok{background:var(--signed-bg);color:var(--good)} .res-fail{background:var(--silent-bg);color:var(--bad)} .res-sent{background:var(--unsigned-bg);color:var(--unsigned)}
  .step-body{border-top:1px dashed var(--line);padding:11px 12px;display:flex;flex-direction:column;gap:9px}
  .act-btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:11px;border-radius:11px;font-weight:800;font-size:13.5px;width:100%;box-shadow:var(--shadow)}
  .act-call{background:var(--call);color:#fff} .act-call:hover{background:var(--call-dark)}
  .act-zap{background:#25d366;color:#053b1e} .act-zap:hover{filter:brightness(.96)}
  .act-audio{background:var(--qualified);color:#fff} .act-audio:hover{filter:brightness(1.05)}
  .act-text{background:var(--brand-a);color:#fff} .act-text:hover{filter:brightness(1.05)}
  .hint{font-size:11px;color:var(--text-faint);text-align:center}
  .flow-done{background:var(--surface);border:1.5px dashed var(--line-strong);border-radius:13px;margin-top:11px;padding:15px;text-align:center}
  .flow-done p{margin:0 0 11px;font-size:13px;color:var(--text-soft);font-weight:600}
  .outcome{display:flex;gap:9px;margin:14px 0 6px}
  .oc{flex:1;padding:12px;border-radius:12px;font-weight:800;font-size:13.5px;display:inline-flex;align-items:center;justify-content:center;gap:8px;border:2px solid}
  .oc-win{border-color:var(--signed-bd);background:var(--signed-bg);color:var(--good)} .oc-win:hover{background:color-mix(in srgb,var(--signed) 16%,transparent)}
  .oc-lose{border-color:var(--silent-bd);background:var(--silent-bg);color:var(--bad)} .oc-lose:hover{background:color-mix(in srgb,var(--silent) 12%,transparent)}
  .tl{margin-top:6px;padding-left:4px}
  .tl-item{display:flex;gap:10px;padding:7px 0}
  .tl-dot{width:25px;height:25px;border-radius:8px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:12px;background:var(--surface-3);color:var(--text-soft);border:1px solid var(--line)}
  .tl-item .tt{font-size:12.5px;font-weight:700} .tl-item .td{font-size:10.5px;color:var(--text-faint)} .tl-item .tn{font-size:12px;color:var(--text-soft);margin-top:2px}

  /* ---------- CHAT PANE (sempre visível) ---------- */
  .chat-h{flex-shrink:0;padding:11px 15px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:11px;background:var(--surface)}
  .chat-h .av{width:38px;height:38px;border-radius:50%;background:var(--surface-3);display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
  .chat-h .nm{font-weight:800;font-size:14px} .chat-h .st{font-size:11px;color:var(--text-faint);display:flex;align-items:center;gap:5px}
  .chat-h .st .g{width:7px;height:7px;border-radius:50%;background:var(--text-faint)} .chat-h .st.on .g{background:var(--good)}
  .chat-actions{margin-left:auto;display:flex;gap:7px}
  .cact{width:38px;height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center;color:#fff;box-shadow:var(--shadow)}
  .cact.voip{background:var(--call)} .cact.voip:hover{background:var(--call-dark)}
  .cact.zap{background:#25d366;color:#053b1e} .cact.zap:hover{filter:brightness(.96)}
  .chat-msgs{flex:1;min-height:0;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:7px;background:linear-gradient(160deg,var(--wa-bg-a),var(--wa-bg-b))}

function bubble(m){

  return `<div class="bub ${cls}">${nm}<div>${esc(m.msg)}</div><div class="tm">${esc(m.hora||nowHm())}</div></div>`;
}

function renderFlow(c){
  const done=c.steps.filter(s=>s.status==='done').length;
  let h=`<div class="flow"><div class="flow-h"><span class="ttl">Fluxo de recuperação</span><span class="prog tnum">${done}/${c.steps.length} ações</span></div>`;
  c.steps.forEach((s,i)=>{
    const ch=CH[s.channel],isActive=i===c.currentStep&&c.status!=='won'&&c.status!=='lost',isDone=s.status==='done';
    const cls=isDone?'done':(isActive?'active':'locked');let rb='';
    if(isDone){const map={ok:['res-ok','✓ '+(s.disposition||'Feito')],sent:['res-sent','✓ Enviado'],fail:['res-fail','✕ '+(s.disposition||'Sem contato')]};const r=map[s.result]||map.ok;rb=`<span class="step-res ${r[0]}">${r[1]}</span>`;}
    h+=`<div class="step ${cls}"><div class="step-h"><div class="step-n">${isDone?I.check:(i+1)}</div><div class="step-info"><div class="sl">${ch.label}</div><div class="sc">${ch.sub}</div></div>${rb}</div>
      ${isActive?`<div class="step-body"><button class="act-btn ${ch.btn}" onclick="doAction(${i})">${ch.icon} ${ch.txt}</button><div class="hint">Execute e registre o resultado para liberar o próximo passo.</div></div>`:''}</div>`;
  });
  if(c.currentStep>=c.steps.length&&c.status!=='won'&&c.status!=='lost')h+=`<div class="flow-done"><p>Todas as ações do fluxo foram executadas.<br>Registre o desfecho comercial.</p></div>`;
  return h+'</div>';
}

  document.getElementById('recBox').classList.add('hidden');
  const b=document.getElementById('audioSend');b.classList.remove('hidden');
  b.innerHTML=`<div style="display:flex;align-items:center;gap:10px;background:var(--surface-2);border:1px solid var(--line);border-radius:11px;padding:10px 12px"><span style="color:var(--qualified)">${I.mic}</span><div style="flex:1"><div style="font-weight:700;font-size:12.5px">Áudio gravado</div><div style="font-size:11px;color:var(--text-faint)">0:${String(secs).padStart(2,'0')} · pronto para enviar</div></div></div>
    <div class="row-btns" style="margin-top:11px"><button class="btn btn-ghost" onclick="closeOverlay()">Descartar</button><button class="btn btn-primary" onclick="sendAudio(${i},${secs})">${I.send} Enviar áudio</button></div>`;
}
function sendAudio(i,secs){
  const c=byId(state.caseId);
  if(i>=0){const s=c.steps[i];s.status='done';s.result='sent';s.disposition='Enviado';if(i===c.currentStep)c.currentStep=i+1;}
  c.timeline.push({icon:'🎙️',title:'Áudio enviado no WhatsApp',date:'agora',note:'0:'+String(secs).padStart(2,'0')});
  closeOverlay();addMsg(c,{de:'att',audio:secs,hora:'agora'});renderWorkspace();
  toast('Áudio enviado ao lead');maybeReply(c);
}
function openTextSheet(i){
  const c=byId(state.caseId),s=c.steps[i];
  overlay(`<div class="sheet-h"><h3>Texto no WhatsApp</h3><p>${esc(c.name)} · ${c.phone}</p></div>
    <div class="sheet-b"><div class="script-lbl">Mensagem pronta (edite se quiser)</div><textarea class="note" id="textMsg" style="min-height:140px;font-size:13px">${esc(s.script)}</textarea></div>
    <div class="sheet-f"><button class="btn btn-ghost" onclick="closeOverlay()">Cancelar</button><button class="btn btn-primary" onclick="sendText(${i})">${I.send} Enviar</button></div>`);
}
function sendText(i){
  const c=byId(state.caseId),v=document.getElementById('textMsg').value.trim();
  const s=c.steps[i];s.status='done';s.result='sent';s.disposition='Enviado';if(i===c.currentStep)c.currentStep=i+1;
  c.timeline.push({icon:'💬',title:'Texto enviado no WhatsApp',date:'agora',note:v.slice(0,80)});
  closeOverlay();addMsg(c,{de:'att',msg:v,hora:'agora'});renderWorkspace();
  toast('Mensagem enviada ao lead');maybeReply(c);
}
/* ---------- OUTCOME ---------- */
function renderOutcome(c){
  if(c.status==='won'||c.status==='lost'){const win=c.status==='won';
    return `<div class="flow-done" style="border-style:solid;border-color:${win?'var(--signed-bd)':'var(--silent-bd)'};background:${win?'var(--signed-bg)':'var(--silent-bg)'}"><p style="color:${win?'var(--good)':'var(--bad)'};font-weight:800;font-size:14px;margin-bottom:4px">${win?'✅ Caso ganho':'❌ Caso perdido'}</p><p style="margin:0">${esc(c.outcome||'')}</p></div>`;}
  return `<div class="outcome"><button class="oc oc-win" onclick="openOutcome('won')">${I.check} Marcar ganho</button><button class="oc oc-lose" onclick="openOutcome('lost')">${I.x} Marcar perda</button></div>`;
}
let outcomeKind=null,outcomeReason=null;
function openOutcome(kind){
  outcomeKind=kind;outcomeReason=null;const win=kind==='won';
  const reasons=win?['Assinou o contrato','Objeção contornada','Reengajou e avançou','Contrato emitido']:['Recusou o serviço','Inalcançável após tentativas','Sem interesse','Fechou com concorrente','Contato inválido'];
  overlay(`<div class="sheet-h"><h3>${win?'Selar como ganho':'Selar como perda'}</h3><p>Registra o desfecho e fecha o caso na fila.</p></div>
    <div class="sheet-b"><div class="disp"><div class="lbl">Motivo</div><div class="disp-opts" id="ocOpts">${reasons.map(r=>`<button class="dopt" aria-pressed="false" onclick="pickOut(this,'${esc(r)}')">${r}</button>`).join('')}</div><textarea class="note" id="ocNote" placeholder="Observação final (opcional)…"></textarea></div></div>
    <div class="sheet-f"><button class="btn btn-ghost" onclick="closeOverlay()">Cancelar</button><button class="btn btn-primary" id="ocC" disabled onclick="confirmOut()">${win?'Confirmar ganho':'Confirmar perda'}</button></div>`);
}
function pickOut(b,v){outcomeReason=v;document.querySelectorAll('#ocOpts .dopt').forEach(x=>x.setAttribute('aria-pressed','false'));b.setAttribute('aria-pressed','true');document.getElementById('ocC').disabled=false;}
function confirmOut(){
  const c=byId(state.caseId),note=document.getElementById('ocNote').value.trim();
  c.status=outcomeKind;c.outcome=outcomeReason+(note?(' — '+note):'');
  c.timeline.push({icon:outcomeKind==='won'?'✅':'❌',title:outcomeKind==='won'?'Caso ganho':'Caso perdido',date:'agora',note:c.outcome});
  if(outcomeKind==='won'){wonToday++;recoveredToday++;}else lostToday++;
  closeOverlay();toast(outcomeKind==='won'?'🎉 Caso ganho':'Caso perdido');setTimeout(backToTriage,700);
}
/* ---------- overlay/toast/theme ---------- */
function overlay(html){document.getElementById('overlayRoot').innerHTML=`<div class="overlay" onclick="if(event.target===this)closeOverlay()"><div class="sheet">${html}</div></div>`;}
function closeOverlay(){clearInterval(actTimer);document.getElementById('overlayRoot').innerHTML='';}
function toast(msg){const r=document.getElementById('toastRoot');r.innerHTML=`<div class="toast">${I.check} ${esc(msg)}</div>`;setTimeout(()=>{r.innerHTML='';},2400);}
document.getElementById('themeBtn').onclick=()=>{const cur=document.documentElement.getAttribute('data-theme');const dark=cur?cur==='dark':window.matchMedia('(prefers-color-scheme:dark)').matches;document.documentElement.setAttribute('data-theme',dark?'light':'dark');};
document.getElementById('pullNext').onclick=pullNext;
renderTriage();
</script>
